<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; padding: 20px; background: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .stat-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .stat-value { font-size: 32px; font-weight: 700; color: #6366f1; margin: 4px 0; }
        .progress-container { background: #e2e8f0; border-radius: 100px; height: 10px; margin-top: 12px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #6366f1, #8b5cf6); height: 100%; transition: width 1s ease-out; }
        .refresh-btn { width: 100%; background: #1e293b; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .refresh-btn:hover { background: #334155; transform: translateY(-1px); }
        .venue-list { margin-top: 10px; font-size: 14px; }
        .venue-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #6366f1; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading { display: none; margin-bottom: 10px; font-size: 14px; color: #64748b; }
    </style>
</head>
<body>
    <h2 style="margin-top: 0;">Event Dashboard</h2>
    
    <div id="loading"><div class="loader"></div> Updating stats...</div>

    <div class="card">
        <div class="stat-label">Total Registrations</div>
        <div id="total" class="stat-value">--</div>
    </div>

    <div class="card">
        <div class="stat-label">Checked In</div>
        <div id="checkedIn" class="stat-value">--</div>
        <div id="percentageText" style="font-size: 14px; font-weight: 600; color: #64748b;">--% of total</div>
        <div class="progress-container">
            <div id="progress" class="progress-bar" style="width: 0%"></div>
        </div>
    </div>

    <button class="refresh-btn" onclick="updateStats()">🔄 Refresh Data</button>

    <script>
        function updateStats() {
            document.getElementById('loading').style.display = 'block';
            google.script.run
                .withSuccessHandler(function(stats) {
                    document.getElementById('total').textContent = stats.total;
                    document.getElementById('checkedIn').textContent = stats.checkedIn;
                    document.getElementById('percentageText').textContent = stats.percentage + '% of total';
                    document.getElementById('progress').style.width = stats.percentage + '%';
                    document.getElementById('loading').style.display = 'none';
                })
                .getAnalytics();
        }

        // Auto update on load
        window.onload = updateStats;
        // Polling every 30 seconds
        setInterval(updateStats, 30000);
    </script>
</body>
</html>
